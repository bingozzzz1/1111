name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Show environment
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install --verbose

      - name: Build Vite app
        run: npm run build

      - name: Show dist files
        run: |
          if (Test-Path dist) { Get-ChildItem -Recurse dist }
          else { Write-Host "dist folder not found" }

      - name: Package Electron app
        run: npx electron-builder --win nsis --publish never

      - name: Show release files
        if: always()
        run: |
          if (Test-Path release) { Get-ChildItem -Recurse release }
          else { Write-Host "release folder not found" }

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hotstrip-windows-build
          path: |
            dist/**
            release/**
          if-no-files-found: warn
